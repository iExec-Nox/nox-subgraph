name: Subgraph - CI

on: 
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.ref }}-subgraph-ci
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Check Format
        run: npm run check-format || true

      - name: Codegen
        run: npm run codegen

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build
