type Allowed @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  account: Bytes! # address
  handle: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Initialized @entity(immutable: true) {
  id: Bytes!
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MarkedAsPubliclyDecryptable @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  handle: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  previousOwner: Bytes! # address
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Upgraded @entity(immutable: true) {
  id: Bytes!
  implementation: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ViewerAdded @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  viewer: Bytes! # address
  handle: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Handle @entity (immutable: false) {
  id: Bytes!
  isPublic: Boolean!
  viewers: [Bytes!]! # address[]
  allowedAccounts: [Bytes!]! # address[]
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}