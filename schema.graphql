enum Operator {
  PlaintextToEncrypted
  Add
  Sub
  Mul
  Div
  SafeAdd
  SafeSub
  SafeMul
  SafeDiv
  Eq
  Ne
  Lt
  Le
  Gt
  Ge
  Select
  Transfer
  Mint
  Burn
}

enum Role {
  ADMIN
  VIEWER
}

type Handle @entity(immutable: false) {
  id: Bytes!
  isPubliclyDecryptable: Boolean!
  operation: Operation
  roles: [HandleRole!]! @derivedFrom(field: "handle")
}

type Operation @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  operator: Operator!
  operands: [Handle!]!
  outputs: [Handle!]! @derivedFrom(field: "operation")
  plaintext: Bytes
  transactionHash: Bytes!
}

type HandleRole @entity(immutable: true) {
  id: Bytes!
  handle: Handle!
  account: Bytes!
  role: Role!
  grantedBy: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}